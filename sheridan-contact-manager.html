<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheridan Legal — Contact Manager</title>
<style>
  :root {
    --powder: #e8f4f8;
    --teal: #2a7d8c;
    --teal-light: #5aa8b5;
    --teal-dark: #1a5a66;
    --aqua: #b8dde4;
    --bg: #f5f8fa;
    --white: #ffffff;
    --text: #1a2e35;
    --text-muted: #5a7580;
    --border: #cde0e5;
    --danger: #c0392b;
    --danger-bg: #fdf0ee;
    --success: #1a7a4a;
    --success-bg: #edf7f1;
    --font: 'Georgia', serif;
    --sans: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--teal-dark);
    color: #fff;
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--teal-light);
  }

  header h1 {
    font-family: var(--font);
    font-size: 1.4rem;
    font-weight: normal;
    letter-spacing: 0.01em;
  }

  header span {
    font-size: 0.8rem;
    opacity: 0.7;
    font-family: var(--sans);
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem;
  }

  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 1.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .toolbar input[type="text"] {
    flex: 1;
    min-width: 200px;
    padding: 0.55rem 1rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.9rem;
    background: var(--white);
    color: var(--text);
    outline: none;
  }

  .toolbar input[type="text"]:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(42,125,140,0.12);
  }

  .filter-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-tag {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }

  .filter-tag:hover { border-color: var(--teal-light); color: var(--teal); }
  .filter-tag.active { background: var(--teal); color: #fff; border-color: var(--teal); }
  .filter-tag.all { background: var(--teal-dark); color: #fff; border-color: var(--teal-dark); }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    text-align: center;
  }

  .stat-card .num {
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--teal);
    line-height: 1;
    font-family: var(--font);
  }

  .stat-card .lbl {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .actions-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 8px;
  }

  .actions-bar .count {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .btn {
    padding: 0.5rem 1.1rem;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    font-family: var(--sans);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--teal);
    color: #fff;
    border-color: var(--teal);
  }
  .btn-primary:hover { background: var(--teal-dark); border-color: var(--teal-dark); }

  .btn-outline {
    background: var(--white);
    color: var(--teal);
    border-color: var(--teal);
  }
  .btn-outline:hover { background: var(--powder); }

  .btn-success {
    background: var(--success);
    color: #fff;
    border-color: var(--success);
  }
  .btn-success:hover { opacity: 0.9; }

  .btn-danger-sm {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 6px;
    font-size: 1.1rem;
    border-radius: 4px;
    transition: all 0.1s;
    line-height: 1;
  }
  .btn-danger-sm:hover { background: var(--danger-bg); color: var(--danger); }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--white);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    font-size: 0.875rem;
  }

  thead {
    background: var(--powder);
  }

  th {
    padding: 0.75rem 1rem;
    text-align: left;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(42,125,140,0.03); }

  .tag-pill {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    margin: 2px 2px;
    letter-spacing: 0.02em;
  }

  .tag-Conveyancing   { background: #dbeafe; color: #1e40af; }
  .tag-Wills          { background: #ede9fe; color: #4c1d95; }
  .tag-Family-Law     { background: #fce7f3; color: #831843; }
  .tag-Property       { background: #d1fae5; color: #064e3b; }
  .tag-Commercial     { background: #fef3c7; color: #78350f; }
  .tag-Estate         { background: #fee2e2; color: #7f1d1d; }
  .tag-Newsletter     { background: var(--powder); color: var(--teal-dark); }

  .location-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.72rem;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .checkbox-col { width: 36px; }
  input[type="checkbox"] { cursor: pointer; accent-color: var(--teal); width: 15px; height: 15px; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 10px;
    padding: 2rem;
    width: 500px;
    max-width: 95vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }

  .modal h2 {
    font-family: var(--font);
    font-size: 1.2rem;
    font-weight: normal;
    margin-bottom: 1.25rem;
    color: var(--teal-dark);
  }

  .form-row {
    margin-bottom: 1rem;
  }

  .form-row label {
    display: block;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 600;
  }

  .form-row input[type="text"],
  .form-row input[type="email"],
  .form-row select {
    width: 100%;
    padding: 0.5rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--white);
    font-family: var(--sans);
    outline: none;
  }

  .form-row input:focus, .form-row select:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(42,125,140,0.12);
  }

  .tag-checkboxes {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .tag-check {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.12s;
    background: var(--white);
    color: var(--text-muted);
  }

  .tag-check input { display: none; }
  .tag-check:has(input:checked) {
    background: var(--teal);
    color: #fff;
    border-color: var(--teal);
  }

  .form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 1.25rem;
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--teal-dark);
    color: #fff;
    padding: 0.75rem 1.25rem;
    border-radius: 8px;
    font-size: 0.875rem;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
  }

  .empty-state p { font-size: 0.9rem; margin-top: 0.5rem; }

  .export-section {
    background: var(--success-bg);
    border: 1px solid #9ecfb4;
    border-radius: 8px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .export-section p {
    font-size: 0.875rem;
    color: var(--success);
    font-weight: 500;
  }

  .export-section span {
    font-size: 0.78rem;
    color: #3a8a5a;
  }

  @media (max-width: 700px) {
    .container { padding: 1rem; }
    header { padding: 1rem; }
    table { font-size: 0.78rem; }
    th, td { padding: 0.55rem 0.65rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Sheridan Legal &mdash; Contact Manager</h1>
  <span>Export ready for MailerLite &amp; other email tools</span>
</header>

<div class="container">

  <div class="stats-row" id="statsRow"></div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search by name, email or location…" oninput="render()">
    <div class="filter-tags" id="filterTags"></div>
    <button class="btn btn-primary" onclick="openModal()">+ Add Contact</button>
  </div>

  <div id="exportBanner" style="display:none" class="export-section">
    <div>
      <p id="exportMsg">2 contacts selected</p>
      <span>CSV includes: name, email, phone, location, matter tags</span>
    </div>
    <button class="btn btn-success" onclick="exportCSV()">⬇ Download CSV</button>
  </div>

  <div class="actions-bar">
    <div class="count" id="countLabel"></div>
    <div style="display:flex; gap:8px; align-items:center;">
      <button class="btn btn-outline" onclick="exportCSV(true)" title="Export all visible contacts">Export All Visible</button>
      <button class="btn btn-outline" onclick="clearSelection()">Clear Selection</button>
    </div>
  </div>

  <div id="tableWrap"></div>

</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Contact</h2>
    <div class="form-row">
      <label>First Name</label>
      <input type="text" id="fFirstName" placeholder="Jane">
    </div>
    <div class="form-row">
      <label>Last Name</label>
      <input type="text" id="fLastName" placeholder="Smith">
    </div>
    <div class="form-row">
      <label>Email</label>
      <input type="email" id="fEmail" placeholder="jane@example.com">
    </div>
    <div class="form-row">
      <label>Phone</label>
      <input type="text" id="fPhone" placeholder="04xx xxx xxx">
    </div>
    <div class="form-row">
      <label>Location</label>
      <select id="fLocation">
        <option value="">— Select —</option>
        <option>Taree</option>
        <option>Port Macquarie</option>
        <option>Kempsey</option>
        <option>Coffs Harbour</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-row">
      <label>Matter Type(s)</label>
      <div class="tag-checkboxes" id="tagCheckboxes"></div>
    </div>
    <div class="form-row">
      <label>Newsletter</label>
      <div class="tag-checkboxes">
        <label class="tag-check"><input type="checkbox" id="fNewsletter"> Newsletter subscriber</label>
      </div>
    </div>
    <div class="form-row">
      <label>Notes</label>
      <input type="text" id="fNotes" placeholder="Optional internal note">
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveContact()">Save Contact</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MATTER_TAGS = ['Conveyancing','Wills','Family Law','Property','Commercial','Estate'];
const LOCATIONS = ['Taree','Port Macquarie','Kempsey','Coffs Harbour','Other'];

let contacts = JSON.parse(localStorage.getItem('slContacts') || '[]');
let activeFilter = 'All';
let editingId = null;

if (contacts.length === 0) {
  contacts = [
    { id: 1, firstName:'Margaret', lastName:'Hollis', email:'margaret.hollis@email.com', phone:'0412 345 678', location:'Taree', tags:['Conveyancing','Wills'], newsletter:true, notes:'Settlement Feb 2024' },
    { id: 2, firstName:'David', lastName:'Nguyen', email:'d.nguyen@example.com', phone:'0438 901 234', location:'Port Macquarie', tags:['Family Law'], newsletter:false, notes:'' },
    { id: 3, firstName:'Susan', lastName:'Park', email:'susan.park@gmail.com', phone:'0421 567 890', location:'Kempsey', tags:['Wills','Estate'], newsletter:true, notes:'' },
    { id: 4, firstName:'Tom', lastName:'Briggs', email:'tom.briggs@hotmail.com', phone:'0455 123 456', location:'Taree', tags:['Conveyancing'], newsletter:true, notes:'Referred by M. Hollis' },
    { id: 5, firstName:'Alice', lastName:'Farrow', email:'afarrow@business.com.au', phone:'0408 765 432', location:'Coffs Harbour', tags:['Commercial','Property'], newsletter:false, notes:'' },
    { id: 6, firstName:'James', lastName:'Lowe', email:'james.lowe@email.com', phone:'0447 234 567', location:'Port Macquarie', tags:['Conveyancing','Property'], newsletter:true, notes:'' },
  ];
  save();
}

function save() {
  localStorage.setItem('slContacts', JSON.stringify(contacts));
}

function getFilteredContacts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return contacts.filter(c => {
    const matchSearch = !q || (c.firstName+' '+c.lastName+' '+c.email+' '+(c.location||'')).toLowerCase().includes(q);
    let matchFilter = true;
    if (activeFilter !== 'All') {
      if (activeFilter === 'Newsletter') matchFilter = c.newsletter;
      else matchFilter = c.tags.includes(activeFilter);
    }
    return matchSearch && matchFilter;
  });
}

function render() {
  renderStats();
  renderFilters();
  renderTable();
  renderExportBanner();
}

function renderStats() {
  const total = contacts.length;
  const nl = contacts.filter(c=>c.newsletter).length;
  const tagCounts = {};
  MATTER_TAGS.forEach(t => tagCounts[t] = contacts.filter(c=>c.tags.includes(t)).length);
  const topTag = MATTER_TAGS.reduce((a,b) => tagCounts[a]>=tagCounts[b]?a:b);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total Contacts</div></div>
    <div class="stat-card"><div class="num">${nl}</div><div class="lbl">Newsletter</div></div>
    <div class="stat-card"><div class="num">${tagCounts['Conveyancing']}</div><div class="lbl">Conveyancing</div></div>
    <div class="stat-card"><div class="num">${tagCounts['Wills']}</div><div class="lbl">Wills</div></div>
    <div class="stat-card"><div class="num">${tagCounts['Family Law']}</div><div class="lbl">Family Law</div></div>
    <div class="stat-card"><div class="num">${tagCounts['Property']}</div><div class="lbl">Property</div></div>
  `;
}

function renderFilters() {
  const allFilters = ['All', ...MATTER_TAGS, 'Newsletter'];
  document.getElementById('filterTags').innerHTML = allFilters.map(f =>
    `<button class="filter-tag ${f===activeFilter?(f==='All'?'all':'active'):''}" onclick="setFilter('${f}')">${f}</button>`
  ).join('');
}

function setFilter(f) { activeFilter = f; render(); }

function renderTable() {
  const rows = getFilteredContacts();
  document.getElementById('countLabel').textContent = `Showing ${rows.length} of ${contacts.length} contacts`;

  if (rows.length === 0) {
    document.getElementById('tableWrap').innerHTML = `<div class="empty-state"><strong>No contacts found</strong><p>Try adjusting your search or filter.</p></div>`;
    return;
  }

  const tbody = rows.map(c => {
    const tagHtml = c.tags.map(t=>`<span class="tag-pill tag-${t.replace(' ','-')}">${t}</span>`).join('');
    const nlHtml = c.newsletter ? `<span class="tag-pill tag-Newsletter">Newsletter</span>` : '';
    const loc = c.location ? `<span class="location-badge">${c.location}</span>` : '';
    return `<tr>
      <td class="checkbox-col"><input type="checkbox" class="row-check" data-id="${c.id}" onchange="updateSelection()"></td>
      <td><strong>${c.firstName} ${c.lastName}</strong>${c.notes?`<br><span style="font-size:0.72rem;color:var(--text-muted)">${c.notes}</span>`:''}</td>
      <td style="color:var(--teal)">${c.email}</td>
      <td>${c.phone||''}</td>
      <td>${loc}</td>
      <td>${tagHtml}${nlHtml}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-outline" style="padding:3px 10px;font-size:0.78rem" onclick="editContact(${c.id})">Edit</button>
        <button class="btn-danger-sm" onclick="deleteContact(${c.id})" title="Delete">×</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead><tr>
        <th class="checkbox-col"><input type="checkbox" id="selectAll" onchange="toggleAll(this)" title="Select all visible"></th>
        <th>Name</th><th>Email</th><th>Phone</th><th>Location</th><th>Tags</th><th></th>
      </tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;
}

function renderExportBanner() {
  const checked = document.querySelectorAll('.row-check:checked');
  const banner = document.getElementById('exportBanner');
  if (checked.length > 0) {
    banner.style.display = 'flex';
    document.getElementById('exportMsg').textContent = `${checked.length} contact${checked.length>1?'s':''} selected`;
  } else {
    banner.style.display = 'none';
  }
}

function updateSelection() { renderExportBanner(); }

function toggleAll(el) {
  document.querySelectorAll('.row-check').forEach(cb => cb.checked = el.checked);
  renderExportBanner();
}

function clearSelection() {
  document.querySelectorAll('.row-check').forEach(cb => cb.checked = false);
  const sa = document.getElementById('selectAll');
  if (sa) sa.checked = false;
  renderExportBanner();
}

function exportCSV(allVisible = false) {
  let toExport;
  if (allVisible) {
    toExport = getFilteredContacts();
  } else {
    const checked = Array.from(document.querySelectorAll('.row-check:checked')).map(cb => parseInt(cb.dataset.id));
    toExport = contacts.filter(c => checked.includes(c.id));
  }
  if (toExport.length === 0) { showToast('No contacts to export'); return; }

  const header = ['First Name','Last Name','Email','Phone','Location','Matter Tags','Newsletter','Notes'];
  const rows = toExport.map(c => [
    c.firstName, c.lastName, c.email, c.phone||'',
    c.location||'',
    c.tags.join('; '),
    c.newsletter ? 'Yes' : 'No',
    c.notes||''
  ]);

  const csv = [header, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sheridan-legal-contacts-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast(`Exported ${toExport.length} contact${toExport.length>1?'s':''} to CSV`);
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? 'Edit Contact' : 'Add Contact';
  const c = id ? contacts.find(x=>x.id===id) : {};
  document.getElementById('fFirstName').value = c.firstName||'';
  document.getElementById('fLastName').value = c.lastName||'';
  document.getElementById('fEmail').value = c.email||'';
  document.getElementById('fPhone').value = c.phone||'';
  document.getElementById('fLocation').value = c.location||'';
  document.getElementById('fNotes').value = c.notes||'';
  document.getElementById('fNewsletter').checked = c.newsletter||false;

  document.getElementById('tagCheckboxes').innerHTML = MATTER_TAGS.map(t =>
    `<label class="tag-check"><input type="checkbox" value="${t}" ${(c.tags||[]).includes(t)?'checked':''}> ${t}</label>`
  ).join('');

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fFirstName').focus(), 50);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function editContact(id) { openModal(id); }

function saveContact() {
  const firstName = document.getElementById('fFirstName').value.trim();
  const email = document.getElementById('fEmail').value.trim();
  if (!firstName || !email) { showToast('First name and email are required'); return; }

  const tags = Array.from(document.querySelectorAll('#tagCheckboxes input:checked')).map(cb=>cb.value);

  const data = {
    firstName,
    lastName: document.getElementById('fLastName').value.trim(),
    email,
    phone: document.getElementById('fPhone').value.trim(),
    location: document.getElementById('fLocation').value,
    tags,
    newsletter: document.getElementById('fNewsletter').checked,
    notes: document.getElementById('fNotes').value.trim(),
  };

  if (editingId) {
    const idx = contacts.findIndex(c=>c.id===editingId);
    contacts[idx] = { ...contacts[idx], ...data };
    showToast('Contact updated');
  } else {
    data.id = Date.now();
    contacts.push(data);
    showToast('Contact added');
  }

  save();
  closeModal();
  render();
}

function deleteContact(id) {
  if (!confirm('Delete this contact?')) return;
  contacts = contacts.filter(c=>c.id!==id);
  save();
  render();
  showToast('Contact deleted');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

render();
</script>
</body>
</html>
