<title>Holiday Calendar FY2026–27 — Knowledgebase.business</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --forest: #2d5a27; --forest-dk: #1a3d16; --forest-lt: #4a7c59;
  --gold: #c8a84b; --gold-bg: rgba(200,168,75,0.1); --gold-dim: rgba(200,168,75,0.3);
  --bg: #f0f5ef; --white: #ffffff; --border: #d4e8d1;
  --text: #1a3d16; --text-muted: #6b9a78; --text-dim: #a8c8b0;
  --red: #8b1f1f; --red-bg: #fdf0f0;
  --amber: #854f0b; --amber-bg: #fdf3e3;
  --blue: #1a4a8a; --blue-bg: #e8f0fb;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* HEADER */
.site-header { background: var(--forest-dk); border-bottom: 2px solid var(--gold); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.header-brand { font-family: 'Libre Baskerville', serif; font-size: 13px; color: var(--gold); }
.header-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }

/* STATE SELECTOR */
.state-selector { display: flex; align-items: center; gap: 8px; }
.state-selector label { font-size: 11px; color: rgba(255,255,255,0.5); }
.state-select { padding: 5px 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; background: rgba(255,255,255,0.08); color: #fff; font-size: 12px; font-family: 'DM Sans', sans-serif; outline: none; cursor: pointer; }
.state-select option { background: var(--forest-dk); color: #fff; }

/* MULTI-STATE TOGGLE */
.multi-toggle { font-size: 11px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 5px; cursor: pointer; }
.multi-toggle input { cursor: pointer; }

/* LAYOUT */
.layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 53px); }

/* SIDEBAR */
.sidebar { background: var(--white); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; }
.sidebar-section { margin-bottom: 20px; }
.sidebar-title { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }

/* STATE PILLS */
.state-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.state-pill { font-size: 11px; padding: 3px 8px; border-radius: 99px; border: 1px solid var(--border); background: var(--white); color: var(--text-muted); cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif; }
.state-pill.active { background: var(--forest); color: #fff; border-color: var(--forest); }
.state-pill:hover:not(.active) { border-color: var(--forest-lt); }

/* TEAM MEMBER */
.team-member { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.team-member:last-child { border-bottom: none; }
.member-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.member-name { font-size: 13px; color: var(--text); flex: 1; cursor: pointer; }
.member-name:hover { color: var(--forest); }
.member-days { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
.add-member-btn { width: 100%; padding: 6px; border: 1px dashed var(--border); border-radius: 5px; background: none; color: var(--text-muted); font-size: 12px; cursor: pointer; margin-top: 6px; transition: all .15s; font-family: 'DM Sans', sans-serif; }
.add-member-btn:hover { border-color: var(--forest-lt); color: var(--forest); }

/* PH LEGEND */
.ph-item { display: flex; align-items: center; gap: 7px; padding: 3px 0; font-size: 12px; color: var(--text-muted); }
.ph-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* STATS */
.stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; }
.stat-label { color: var(--text-muted); }
.stat-val { font-weight: 500; color: var(--text); font-family: 'JetBrains Mono', monospace; }

/* MAIN CALENDAR AREA */
.cal-main { padding: 16px; overflow-y: auto; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-title { font-family: 'Libre Baskerville', serif; font-size: 18px; font-weight: 700; color: var(--text); }
.cal-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.nav-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 5px; background: var(--white); color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif; }
.nav-btn:hover { border-color: var(--forest); color: var(--forest); }

/* CALENDAR GRID */
.cal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

/* MONTH CARD */
.month-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.month-header { background: var(--forest); padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; }
.month-name { font-family: 'Libre Baskerville', serif; font-size: 14px; font-weight: 700; color: #fff; }
.month-ph-count { font-size: 10px; color: rgba(255,255,255,0.5); }
.month-body { padding: 8px; }
.day-headers { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; margin-bottom: 2px; }
.day-header { text-align: center; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); padding: 2px 0; }
.day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
.day-cell { min-height: 28px; border-radius: 3px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 2px 1px; position: relative; cursor: default; transition: background .1s; }
.day-cell:not(.empty):hover { background: var(--bg) !important; }
.day-num { font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.4; }
.day-cell.empty .day-num { color: transparent; }
.day-cell.weekend { background: rgba(212,232,209,0.2); }
.day-cell.weekend .day-num { color: var(--text-muted); }
.day-cell.public-holiday { background: rgba(200,168,75,0.15); }
.day-cell.public-holiday .day-num { color: var(--amber); font-weight: 600; }
.day-cell.school-hols { background: rgba(230,241,251,0.5); }
.day-cell.shutdown { background: rgba(139,31,31,0.08); }
.day-cell.shutdown .day-num { color: var(--red); }
.day-cell.today { outline: 2px solid var(--gold); outline-offset: -1px; }
.day-cell.today .day-num { color: var(--forest); font-weight: 700; }

/* LEAVE DOTS */
.leave-dots { display: flex; gap: 1px; flex-wrap: wrap; justify-content: center; margin-top: 1px; }
.leave-dot { width: 5px; height: 5px; border-radius: 50%; }

/* PH TOOLTIP */
.day-cell[title]:hover::after { content: attr(title); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--forest-dk); color: #fff; font-size: 10px; padding: 3px 7px; border-radius: 4px; white-space: nowrap; z-index: 10; pointer-events: none; margin-bottom: 3px; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--white); border-radius: 10px; width: 100%; max-width: 480px; overflow: hidden; }
.modal-header { background: var(--forest-dk); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-family: 'Libre Baskerville', serif; font-size: 15px; font-weight: 700; color: #fff; }
.modal-close { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 18px; cursor: pointer; line-height: 1; }
.modal-close:hover { color: #fff; }
.modal-body { padding: 18px; }
.modal-footer { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; gap: 10px; }
.fg { margin-bottom: 14px; }
.fl { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; display: block; }
.fi { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 13px; background: #fafcfa; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; }
.fi:focus { border-color: var(--forest); }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-save { padding: 8px 20px; border: none; border-radius: 5px; background: var(--forest); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.btn-cancel { padding: 8px 16px; border: 1px solid var(--border); border-radius: 5px; background: none; color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.btn-danger { padding: 8px 16px; border: 1px solid var(--red); border-radius: 5px; background: none; color: var(--red); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.color-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color .15s; }
.color-swatch.sel { border-color: var(--text); }

/* LEAVE ENTRY */
.leave-entry { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.leave-entry:last-child { border-bottom: none; }
.leave-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 0; }
.leave-del:hover { color: var(--red); }

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .cal-grid { grid-template-columns: 1fr; }
}

let team = [];
let editingMemberId = null;
let tempLeave = [];
let currentHalf = 0; // 0 = Jul-Dec 2026, 1 = Jan-Jun 2027

// ── INIT ──
window.onload = function() {
  load();
  renderStatePills();
  renderCalendar();
  renderTeam();
  renderStats();
};

// ── STATE PILLS ──
const ALL_STATES = ['NSW','VIC','QLD','WA','SA','TAS','ACT','NT'];

function renderStatePills() {
  const container = document.getElementById('state-pills');
  container.innerHTML = ALL_STATES.map(s => `
    <button class="state-pill ${activeStates.has(s) ? 'active' : ''}" onclick="toggleState('${s}')">${s}</button>
  `).join('');
}

function toggleState(s) {
  if (activeStates.has(s) && activeStates.size === 1) return;
  if (activeStates.has(s)) activeStates.delete(s);
  else activeStates.add(s);
  if (!activeStates.has(primaryState)) primaryState = [...activeStates][0];
  document.getElementById('primary-state').value = primaryState;
  renderStatePills();
  renderCalendar();
  save();
}

function onStateChange() {
  primaryState = document.getElementById('primary-state').value;
  activeStates.add(primaryState);
  renderStatePills();
  renderCalendar();
  save();
}

// ── HOLIDAY HELPERS ──
function ds(d) { return d.toISOString().slice(0,10); }
function pd(s) { const p = s.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
function isWknd(d) { const w = d.getDay(); return w===0||w===6; }
function isPH(d, states) {
  const s = ds(d);
  for (const st of states) {
    const ph = (PUBLIC_HOLIDAYS[st]||[]).find(h => h.d === s);
    if (ph) return ph;
  }
  return null;
}
function isSH(d) { const s=ds(d); return SCHOOL_HOLS.some(h=>s>=h.s&&s<=h.e); }
function isSD(d) { const s=ds(d); return SHUTDOWN.some(h=>s>=h.s&&s<=h.e); }
function isToday(d) { return ds(d)===ds(new Date()); }

function getMemberLeaveOnDay(member, d) {
  const s = ds(d);
  return (member.leave||[]).some(l => s>=l.s && s<=l.e);
}

// ── CALENDAR RENDER ──
const HALF_MONTHS = [
  [{y:2026,m:6},{y:2026,m:7},{y:2026,m:8},{y:2026,m:9},{y:2026,m:10},{y:2026,m:11}],
  [{y:2027,m:0},{y:2027,m:1},{y:2027,m:2},{y:2027,m:3},{y:2027,m:4},{y:2027,m:5}]
];

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  const months = HALF_MONTHS[currentHalf];
  grid.innerHTML = months.map(({y,m}) => renderMonth(y,m)).join('');
  document.getElementById('cal-title').textContent = currentHalf === 0 ? 'July – December 2026' : 'January – June 2027';
}

function renderMonth(year, month) {
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  const startDow = (firstDay.getDay()+6)%7; // Mon=0
  const states = [...activeStates];

  // Count PHs this month
  let phCount = 0;
  for (let d=1; d<=lastDay.getDate(); d++) {
    if (isPH(new Date(year,month,d), states)) phCount++;
  }

  let cells = '';
  // Empty cells before first day
  for (let i=0; i<startDow; i++) cells += `<div class="day-cell empty"><div class="day-num"> </div></div>`;

  for (let d=1; d<=lastDay.getDate(); d++) {
    const date = new Date(year, month, d);
    const ph = isPH(date, states);
    const sh = isSH(date);
    const sd = isSD(date);
    const wknd = isWknd(date);
    const today = isToday(date);

    let cls = 'day-cell';
    if (wknd) cls += ' weekend';
    if (ph) cls += ' public-holiday';
    if (sh && !ph) cls += ' school-hols';
    if (sd && !ph) cls += ' shutdown';
    if (today) cls += ' today';

    // Multi-state PH labels
    let phLabel = '';
    if (ph) {
      const statesWithPH = states.filter(s => (PUBLIC_HOLIDAYS[s]||[]).find(h=>h.d===ds(date)));
      phLabel = ph.n + (statesWithPH.length < states.length ? ` (${statesWithPH.join(',')})` : '');
    }

    // Leave dots
    const onLeave = team.filter(m => getMemberLeaveOnDay(m, date));
    const dots = onLeave.map(m => `<div class="leave-dot" style="background:${m.color}" title="${m.name}"></div>`).join('');

    cells += `<div class="${cls}" title="${phLabel||''}">
      <div class="day-num">${d}</div>
      ${dots ? `<div class="leave-dots">${dots}</div>` : ''}
    </div>`;
  }

  return `<div class="month-card">
    <div class="month-header">
      <div class="month-name">${MONTHS[month]} ${year}</div>
      <div class="month-ph-count">${phCount} public holiday${phCount!==1?'s':''}</div>
    </div>
    <div class="month-body">
      <div class="day-headers">
        ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="day-header">${d}</div>`).join('')}
      </div>
      <div class="day-grid">${cells}</div>
    </div>
  </div>`;
}

function prevHalf() { if (currentHalf > 0) { currentHalf--; renderCalendar(); } }
function nextHalf() { if (currentHalf < 1) { currentHalf++; renderCalendar(); } }

// ── TEAM ──
function renderTeam() {
  const list = document.getElementById('team-list');
  if (!team.length) {
    list.innerHTML = `<div style="font-size:12px;color:var(--text-dim);padding:8px 0;">No team members yet. Add your team to track leave.</div>`;
    return;
  }
  list.innerHTML = team.map(m => {
    const totalLeave = countLeave(m);
    const entitlement = m.leave_days || 20;
    const remaining = entitlement - totalLeave;
    return `<div class="team-member">
      <div class="member-dot" style="background:${m.color}"></div>
      <div class="member-name" onclick="openMemberModal('${m.id}')">${m.name}<div style="font-size:11px;color:var(--text-muted)">${m.role||''} · ${m.state||primaryState}</div></div>
      <div class="member-days">${totalLeave}/${entitlement}d</div>
    </div>`;
  }).join('');
}

function countLeave(m) {
  let total = 0;
  (m.leave||[]).forEach(l => {
    let d = pd(l.s);
    const end = pd(l.e);
    while (d <= end) {
      if (!isWknd(d) && !isPH(d, [m.state||primaryState])) total++;
      d = new Date(d.getTime() + 86400000);
    }
  });
  return total;
}

// ── STATS ──
function renderStats() {
  const states = [...activeStates];
  let workdays = 0, publicHols = 0;
  let d = new Date(2026,6,1);
  const end = new Date(2027,6,1);
  while (d < end) {
    if (!isWknd(d)) {
      workdays++;
      if (isPH(d, states)) publicHols++;
    }
    d = new Date(d.getTime() + 86400000);
  }
  const netWorkdays = workdays - publicHols;
  const statsEl = document.getElementById('fy-stats');
  const stateList = states.join(', ');
  statsEl.innerHTML = `
    <div class="stat-row"><span class="stat-label">Work days (${stateList})</span><span class="stat-val">${workdays}</span></div>
    <div class="stat-row"><span class="stat-label">Public holidays</span><span class="stat-val">${publicHols}</span></div>
    <div class="stat-row"><span class="stat-label">Net working days</span><span class="stat-val">${netWorkdays}</span></div>
    ${team.map(m => `<div class="stat-row"><span class="stat-label">${m.name} leave</span><span class="stat-val">${countLeave(m)}d</span></div>`).join('')}
  `;
}

// ── MEMBER MODAL ──
const COLORS_LIST = COLORS;

function openMemberModal(id) {
  editingMemberId = id || null;
  tempLeave = [];

  document.getElementById('member-modal-title').textContent = id ? 'Edit team member' : 'Add team member';
  document.getElementById('btn-delete-member').style.display = id ? 'block' : 'none';

  // Render color swatches
  const colorRow = document.getElementById('color-row');
  const usedColors = team.filter(m => !id || m.id !== id).map(m => m.color);
  const defaultColor = COLORS_LIST.find(c => !usedColors.includes(c)) || COLORS_LIST[0];
  colorRow.innerHTML = COLORS_LIST.map(c =>
    `<div class="color-swatch ${c===defaultColor?'sel':''}" style="background:${c}" onclick="selColor('${c}',this)"></div>`
  ).join('');

  if (id) {
    const m = team.find(x => x.id === id);
    if (m) {
      document.getElementById('m-name').value = m.name || '';
      document.getElementById('m-role').value = m.role || '';
      document.getElementById('m-state').value = m.state || primaryState;
      document.getElementById('m-leave').value = m.leave_days || 20;
      tempLeave = [...(m.leave||[])];
      // Set correct color swatch
      colorRow.querySelectorAll('.color-swatch').forEach(s => {
        s.classList.toggle('sel', s.style.background === m.color || s.style.backgroundColor === m.color);
      });
    }
  } else {
    document.getElementById('m-name').value = '';
    document.getElementById('m-role').value = '';
    document.getElementById('m-state').value = primaryState;
    document.getElementById('m-leave').value = 20;
  }

  renderLeaveList();
  document.getElementById('member-modal').classList.add('open');
}

function selColor(color, el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('sel'));
  el.classList.add('sel');
}

function addLeaveEntry() {
  const s = document.getElementById('leave-start').value;
  const e = document.getElementById('leave-end').value;
  if (!s || !e || s > e) { alert('Please select a valid date range.'); return; }
  tempLeave.push({s, e});
  document.getElementById('leave-start').value = '';
  document.getElementById('leave-end').value = '';
  renderLeaveList();
}

function renderLeaveList() {
  const list = document.getElementById('leave-list');
  if (!tempLeave.length) { list.innerHTML = '<div style="font-size:12px;color:var(--text-dim)">No leave booked yet.</div>'; return; }
  list.innerHTML = tempLeave.map((l,i) => `
    <div class="leave-entry">
      <div style="flex:1">${l.s} → ${l.e}</div>
      <button class="leave-del" onclick="removeLeave(${i})">×</button>
    </div>`).join('');
}

function removeLeave(i) { tempLeave.splice(i,1); renderLeaveList(); }

function saveMember() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('Please enter a name.'); return; }
  const selSwatch = document.querySelector('.color-swatch.sel');
  const color = selSwatch ? selSwatch.style.backgroundColor || selSwatch.style.background : COLORS_LIST[0];

  const member = {
    id: editingMemberId || Date.now().toString(),
    name,
    role: document.getElementById('m-role').value.trim(),
    state: document.getElementById('m-state').value,
    leave_days: parseInt(document.getElementById('m-leave').value) || 20,
    color,
    leave: [...tempLeave]
  };

  if (editingMemberId) {
    const idx = team.findIndex(m => m.id === editingMemberId);
    if (idx > -1) team[idx] = member;
  } else {
    team.push(member);
  }

  save();
  renderTeam();
  renderStats();
  renderCalendar();
  closeModal('member-modal');
}

function deleteMember() {
  if (!editingMemberId || !confirm('Remove this team member?')) return;
  team = team.filter(m => m.id !== editingMemberId);
  save();
  renderTeam();
  renderStats();
  renderCalendar();
  closeModal('member-modal');
}

// ── MODAL HELPERS ──
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

// ── SAVE / LOAD ──
function save() {
  try {
    localStorage.setItem('kb_holiday_cal', JSON.stringify({ primaryState, activeStates: [...activeStates], team, currentHalf }));
  } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem('kb_holiday_cal');
    if (!raw) return;
    const d = JSON.parse(raw);
    primaryState = d.primaryState || 'NSW';
    activeStates = new Set(d.activeStates || ['NSW']);
    team = d.team || [];
    currentHalf = d.currentHalf || 0;
    document.getElementById('primary-state').value = primaryState;
  } catch(e) {}
}
</script>
